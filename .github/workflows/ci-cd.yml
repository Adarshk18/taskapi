name: CI/CD Pipeline

# Trigger: runs on every push to main
on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  # ─────────────────────────────────────────
  # JOB 1: CI — Run tests
  # ─────────────────────────────────────────
  test:
    name: Run tests
    runs-on: ubuntu-latest          # GitHub gives you a free Ubuntu VM

    steps:
      - name: Checkout code
        uses: actions/checkout@v4   # pulls your repo into the VM

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run tests
        run: pytest tests/ -v
        # Note: tests use SQLite, so no real Postgres needed here

  # ─────────────────────────────────────────
  # JOB 2: CD — Build & push Docker image
  # Only runs if tests pass, only on main branch
  # ─────────────────────────────────────────
  build-and-push:
    name: Build & push Docker image
    runs-on: ubuntu-latest
    needs: test                      # waits for 'test' job to pass
    if: github.ref == 'refs/heads/main'   # skip on PRs

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and push image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          # Image tag: yourusername/taskapi:latest AND taskapi:abc1234 (git sha)
          tags: |
            ${{ secrets.DOCKERHUB_USERNAME }}/taskapi:latest
            ${{ secrets.DOCKERHUB_USERNAME }}/taskapi:${{ github.sha }}